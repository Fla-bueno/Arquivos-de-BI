
<style>

    :root{
        --caminhao_cor: #02101B;

        --barra_fundo_cor: #02101B;
        --barra_fundo_opacidade: 0.5;

        --seta_cor: #02101B;

        --fonte: 'Arial';

        --rot_dados_tam: 16;
        --rot_dados_cor: #02101B;

        --rot_cat_tam: 15;
        --rot_cat_cor: #02101B;

    }

    #marcador
    {
        transform: translateX(0px);
        animation: anima_marcador .7s linear forwards;
    }

    #barra_progresso
    {
        transform: scaleX(0);
        transform-origin: left;
        transform-box: fill-box;

        animation: anima_barra .7s linear forwards;
    }

    #conteiner_rotulo
    {
        width: 60px;
        height: 35px;
        /* border: 1px solid #f00; */
        transform: translateX(-5px);
    }

    @property --contador
    {
        syntax: '<integer>';
        initial-value: 0;
        inherits: false;
    }

    #porcentagem
    {
        /* background: #ff0; */
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: flex-end;

        font-weight: 800;
        font-family: var(--fonte);
        font-size: var(--rot_dados_tam);
        color: var(--rot_dados_cor);

        counter-set: numero var(--contador);

        animation: anima_contador .7s linear forwards;
    }

    #porcentagem::after
    {
        content: counter(numero) '%' ;
    }





    /******************************** ANIMAÇÃO *********************************** */
    @keyframes anima_marcador
    {
        to
        {
            transform: translateX(70px); 
        }
    }

    @keyframes anima_barra
    {
        to
        {
            transform: scaleX(0.5);  
        }
    }

    @keyframes anima_contador
    {
        to
        {
            --contador: 50
        }
    }
 

</style>
