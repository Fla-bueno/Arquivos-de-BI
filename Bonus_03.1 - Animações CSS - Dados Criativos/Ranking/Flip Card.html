<style>
    :root{
        --tamFonte: 25px;

        --corPrimeira: #f00e99;
        --CorSegunda: #42c21f;
        --CorTerceira: #230355;
        --CorQuarta: #e9082d;
        --CorQuinta: #cefa0c;

        --Gradiente: linear-gradient(270deg, #558CA488 0%, #123064 100% );

    }

    body
    {
        display: flex;
        justify-content: center;
        align-items: center;

        background: #411c52;
    }

    .conteiner
    {
        position: relative;

        width: 500px;
        height: 400px;

        /* border: 1px solid #f00; */

       perspective: 800px;
    }

    .conteiner .card
    {
        position: absolute;

        width: 100%;
        height: 100%;

        backface-visibility: hidden;

        transition: 1s;

        background: var(--Gradiente);

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        border-radius: 20px;

    }

    /* *******************FRENTE******************* */
    .conteiner .card.frente
    {
       /* background: #ff0; */

        transform: rotateY(0);

    }

    .conteiner .card.frente .imagemVendedor
    {
        position: relative;

        width: 95%;
        height: 70%;

    }

    .conteiner .card.frente .nomeVendedor,
    .conteiner .card.frente .valor
    {
        font-size: var(--tamFonte);
        margin-top: 1%;
        white-space: nowrap;
    }

    .conteiner .card.frente .nomeVendedor
    {
        color: var(#123064);
    }

    .conteiner .card.frente .valor
    {
        color: var(#f5f5f5);
    }

    /* *******************VERSO******************** */
    .conteiner .card.verso
    {
        /* background: #0f0; */


        transform: rotateY(-180deg);
    }

    .conteiner .card.verso .categoria
    {
        font-size: calc(var(--tamFonte) / 1);
        color: var(#ebe3e3);
        margin: 0;
    }

    .conteiner .card.verso .CAP,
    .conteiner .card.verso .INT,
    .conteiner .card.verso .NE,
    .conteiner .card.verso .RJ,
    .conteiner .card.verso .NR
    {
        font-size: var(--tamFonte);
        margin: 0;
    }

    .conteiner .card.verso .CAP
    {
        color: var(--corPrimeira);
    }

    .conteiner .card.verso .INT
    {
        color: var(--CorSegunda);
    }

    .conteiner .card.verso .NE
    {
        color: var(--CorTerceira);
    }

    .conteiner .card.verso .RJ
    {
        color: var(--CorQuarta);
    }

    .conteiner .card.verso .NR
    {
        color: var(--CorQuinta);
    }



    /* ********************HOVER****************** */

    .conteiner:hover .card.frente
    {
        transform: rotateY(180deg);
    }

    .conteiner:hover .card.verso
    {
        transform: rotateY(0deg);
    }




</style>

<body>

    <div class='conteiner'>

        <div class='card frente'>
           <img class='imagemVendedor' src='https://i.ibb.co/Dfqh1yyK/Pactuall-Logo.jpg' >
           <h1 class='nomeVendedor'> Entregas por Referência </h1>
           <h1 class='valor'> 10.389 </h1>
           
        </div>

        <div class='card verso'>
            <h1 class='CAP'>203 </h1>
            <h1 class='categoria'> CAP</h1> 

            <h1 class='INT'>95 </h1>
            <h1 class='categoria'> INT</h1> 

            <h1 class='NE'>108 </h1>
            <h1 class='categoria'> NE</h1>

            <h1 class='RJ'>108 </h1>
            <h1 class='categoria'> RJ</h1>

            <h1 class='NR'>108 </h1>
            <h1 class='categoria'> NR</h1>

        </div>
    

    </div>


</body>
