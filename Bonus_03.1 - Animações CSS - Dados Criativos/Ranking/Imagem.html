

<style>

    :root{
        --tamFonte:20px;
        --corPrincipal: #000;
    }

    .box{
        position: relative;

        /*******unidade medida dinamica******/
        width: 200px;
        height: 330px;

        border: 1px solid #000;
    }

    .box .imgBox{
        position: absolute;
        
        width: 100%;
        height: 100%;

        

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .box .imgBox img{
        position: relative;

        width: 70%;
        height: 43%;

        animation: animafoto 2s linear;

        margin-bottom: 10%;
    }

    .box .imgBox h1{
        position: relative;
    
        font-size: var(--tamFonte);
        color: var(--corPrincipal);
    
        margin: 0;

    }

   .box  .imgBox h1:nth-of-type(2){
        margin-top: 15%;
        margin-bottom: -1%;
        font-size: calc(var(--tamFonte) * 1.3);
        font-weight: 700;  
   }



    
    /***************ANIMAÇÕES***********************/
    @keyframes animafoto{
        from{
             transform: scale(0);  
        }

        to{
            transform: scale(1);   
        }
    }


</style

<body>

    <div class='box'>

         <div class='imgbox'>

            <img src='https://i.ibb.co/5W3qvzJj/Flavio-Moldura-Redonda.png'>

            <h1> Flavio </h1>

            <h1> R$ 50.000 </h1>

            <h1> Faturamento </h1>

         </div>   
    </div>

</body>
