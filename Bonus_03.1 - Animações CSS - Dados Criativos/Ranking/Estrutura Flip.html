<style>
    :root{
        --tamFonte: 25px;

        --corPrimeira: #558CA4;
        --CorSegunda: #8DA985;

        --Gradiente: linear-gradient(270deg, #558CA488 0%, #173F5088 100% );

    }

    body
    {
        display: flex;
        justify-content: center;
        align-items: center;

        background: #411c52;
    }

    .conteiner
    {
        position: relative;

        width: 250px;
        height: 400px;

        /* border: 1px solid #f00; */

       perspective: 800px;
    }

    .conteiner .card
    {
        position: absolute;

        width: 100%;
        height: 100%;

        backface-visibility: hidden;

        transition: 1s;

    }

    /* *******************FRENTE******************* */
    .conteiner .card.frente
    {
        background: #ff0;

        transform: rotateY(0);

    }

    /* *******************VERSO******************** */
    .conteiner .card.verso
    {
        background: #0f0;


        transform: rotateY(-180deg);
    }


    /* ********************HOVER****************** */

    .conteiner:hover .card.frente
    {
        transform: rotateY(180deg);
    }

    .conteiner:hover .card.verso
    {
        transform: rotateY(0deg);
    }



</style>

<body>

    <div class="conteiner">

        <div class="card frente">
            JEFFERSON
        </div>

        <div class="card verso">
            NEVES
        </div>
    

    </div>


</body>
