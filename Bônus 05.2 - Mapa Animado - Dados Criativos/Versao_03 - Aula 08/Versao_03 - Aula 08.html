:root
{
    --cor_norte: #92D050;    
    --cor_nordeste: #0070C0;
    --cor_centro_oeste: #4AC4FB;
    --cor_sudeste: #002060;
    --cor_sul: #FDB934;

    --cor_titulo: #727272;

    --cor_regiao_escolhida: #f00;
    

}

svg
{
    border: 1px solid #000;
}


#quadro_informativo
{
   transform: translateX(600px); 
   animation: anima_quadro 1s linear forwards;
}

#sd
{
    transform: translate(0px,0px) scale(1) rotateY(0deg);

    transform-origin: 50% 50%;
    transform-box: fill-box;

    animation: anima_mapa 1s linear forwards;
}




/* *********************************** ANIMAÇÕES ***************************** */

@keyframes anima_quadro
{
    to
    {
        transform: translateX(0px); 
 
    }
}

@keyframes anima_mapa
{
    to 
    {
        transform: translate(369px,-250px) scale(1.3) rotateY(360deg);
    }
}

    Norte
